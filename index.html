// ===== 値変換 =====
function parseValue(v){
  if(!v) return 0;
  v = v.replace(/"/g,"").replace(/\n/g,"").trim();
  if(v.includes("%")) return parseFloat(v)/100;
  return isNaN(v) ? 0 : Number(v);
}

// ===== CSVパース（改行対応）=====
function parseCSV(csv){
  const lines = csv.trim().split("\n");

  const headers = lines[0]
    .split(",")
    .map(h =>
      h.replace(/\r/g,"")
       .replace(/\n/g,"")
       .replace(/"/g,"")
       .replace(/\uFEFF/g,"")
       .trim()
    );

  return lines.slice(1).map(line=>{
    const cols = line.split(",");

    let obj = {};
    headers.forEach((h,i)=>{
      let val = cols[i];

      if(val && val.includes("%")){
        val = parseFloat(val)/100;
      }else{
        val = parseFloat(val) || val;
      }

      obj[h] = val;
    });

    return obj;
  });
}

const runeData = parseCSV(csvData);


// ===== ルーン一覧自動生成 =====

// 安全取得
function v(total,key){
  return Number(total[key] || 0);
}

// 計算
function calc(){

  let total = {};
  Object.keys(runeData[0]).forEach(k=>{
    if(k!=="ルーン名" && k!=="Lv") total[k]=0;
  });

  // ===== 期待値用 =====
  let defExp = 0;
  let sacrificeExp = 0;
  let effectTotal = 0;
  let healAtkTotal = 0;
  let healHpTotal = 0;
  let healFixedTotal = 0;
  let buffTotal = 0;
  let buffFixed = 0;
  let buffPercent = 0;

  for(let i=1;i<=5;i++){
    let name = document.getElementById("rune"+i).value;

    let data = runeData.find(r=>
      r["ルーン名"]===name && Number(r["Lv"])===lv
    );

    if(!data) continue;

    // ===== 回復期待値（ここに追加）=====
let heal = data["回復量"];
let healRate = data["回復確率"];


let value = Number(data["攻撃バフ"] || 0);
if (name === "勝利の歓声") {
  buffPercent += value;
} else if (name === "最後の贈り物") {
  buffFixed += value;
}

// %変換
if(typeof healRate==="string" && healRate.includes("%")){
  healRate = parseFloat(healRate)/100;
}else{
  healRate = Number(healRate || 0);
}

let def = data["防御"];
let defRate = data["防御確率"];

// %変換
if(typeof defRate==="string" && defRate.includes("%")){
  defRate = parseFloat(defRate)/100;
}else{
  defRate = Number(defRate || 0);
}
defExp += def * defRate;

// 依存別に分岐
if(name === "吸血"){
  healAtkTotal += Number(heal || 0) * healRate;
}else if(name === "ヒル"){
  healHpTotal += Number(heal || 0) * healRate;
}else{
healFixedTotal += Number(heal || 0) * healRate;
}

    let sac = Number(data["犠牲回復量"] || 0);
    let sacRate = data["犠牲確率"];
    if(typeof sacRate==="string" && sacRate.includes("%")){
      sacRate = parseFloat(sacRate)/100;
}else{
      sacRate = Number(sacRate || 0);
    }

    let eff = Number(data["効果ダメージ"] || 0);
    let effRate = data["効果ダメージ発生率"];
    if(typeof effRate==="string" && effRate.includes("%")){
      effRate = parseFloat(effRate)/100;
    }else{
      effRate = Number(effRate || 0);
    }
    effectTotal += eff * effRate;

    // ===== 通常合算 =====
    for(let key in total){
      total[key]+=Number(data[key]||0);
    }
  }

  // ===== 入力 =====
  let hp = Number(document.getElementById("hp").value)||0;
let atk = Number(document.getElementById("atk").value)||0;
let spd = Number(document.getElementById("spd").value)||0;

  let star_hp = Number(document.getElementById("star_hp").value)||0;
  let star_atk = Number(document.getElementById("star_atk").value)||0;
  let star_spd = Number(document.getElementById("star_spd").value) / 100 ||0;
  let star_cd = Number(document.getElementById("star_cd").value) / 100 ||0;
  let star_cr = Number(document.getElementById("star_cr").value) / 100 ||0;
  let egg_atk = Number(document.getElementById("egg_atk").value) / 100 ||0;
  let nest_hp = Number(document.getElementById("nest_hp").value) / 100 ||0;
  let enemy_atk = Number(document.getElementById("enemy_atk").value)||0;

  // ===== ステータス =====
  let lv1 = (hp/10) + atk + spd;

  let HP = (hp + v(total,"体力") + star_hp) * (1 + v(total,"体力(%)") + nest_hp);
  let ATK = (atk + v(total,"攻撃") + star_atk) * (1 + v(total,"攻撃(%)") + egg_atk);
  let effectExp = ATK * effectTotal;
  let SPD = spd * (1 + star_spd);
  let lv2 = (HP/10) + ATK + SPD;
  let healExp = (ATK * healAtkTotal) + (HP * healHpTotal) + healFixedTotal;

  // ===== 攻撃系 =====
  let build = ATK * (1 + v(total,"建築ダメージ"));
  let quake = build * (1 + v(total,"地震ダメージ"));

  // 基礎値
  let base_cr = 0.03;
  let base_cd = 0.05;

  let critRate = base_cr + v(total,"クリティカル発生率") + star_cr;
  let critDmg = base_cd + v(total,"クリティカルダメージ") + star_cd;
  let atkCrit = ATK + (ATK * critDmg);
  let critExp = ATK + (atkCrit * critRate);
  let effect = ATK * v(total,"効果ダメージ");
  let atkEffect = ATK + (ATK * effectExp); 
  let shield = enemy_atk * v(total,"保護膜軽減") * v(total,"保護膜軽減回数");

  let triple =ATK * v(total,"トリプルインパクト");
  let atkTriple = ATK + (triple / 3);

  buffTotal = buffFixed + (ATK * buffPercent);
  let atkBuff = ATK + buffTotal;

  let sacrifice = HP * v(total,"犠牲回復量");
  let sacrigiceExp = HP * v(total,"犠牲回復量") * v(total,"犠牲確率");

  let death = ATK * v(total,"死ぬ準備ダメージ");
  let deathRate = v(total,"死ぬ準備確率");
  // 表示
  document.getElementById("result").innerHTML = `
  <h3>結果</h3>
Lv: ${lv1.toFixed(0)} → ${lv2.toFixed(0)}<br><br>

体力: ${HP.toFixed(1)}<br>
攻撃: ${ATK.toFixed(1)}<br>
速度: ${SPD.toFixed(1)}<br><br>

クリティカルダメージ: ${atkCrit.toFixed(1)}<br>
クリティカル発生率: ${(critRate * 100).toFixed(2)}%<br>
⇒攻撃換算(クリティカル期待値込): ${critExp.toFixed(1)}<br><br>

防御期待値 [/1ターン]: ${defExp.toFixed(1)}<br>
回復期待値 [/1ターン]: ${healExp.toFixed(1)}<br><br>

建築へのダメージ: ${build.toFixed(1)}<br><br>

【地震】ダメージ [/1回]: ${quake.toFixed(1)}<br><br>

【メテオ・落雷】効果ダメージ: ${effect.toFixed(1)}<br>
【メテオ・落雷】効果期待値: ${effectExp.toFixed(1)}<br><br>

【保護膜】軽減ダメージ量(累計): ${shield.toFixed(1)}<br><br>

【犠牲】回復量: ${sacrifice.toFixed(1)}<br><br>

【トリプルインパクト】[/3ターン]: ${triple.toFixed(1)}<br>
⇒攻撃換算(トリプルインパクト期待値込): ${atkTriple.toFixed(1)}<br><br>

【最後の贈り物・勝利の歓声】攻撃バフ: ${buffTotal.toFixed(1)}<br>
⇒攻撃＋攻撃バフ: ${atkBuff.toFixed(1)}<br><br>

【死ぬ準備】効果ダメージ(確率): ${death.toFixed(1)} (${(deathRate*100).toFixed(1)}%)


`;
}
